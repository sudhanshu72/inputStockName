services:
  - type: web
    name: stock-analysis-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:10000
    envVars:
      - key: GROQ_API_KEY
        fromGroup: stock-analysis-env

  - type: web
    name: stock-analysis-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://stock-analysis-api.onrender.com